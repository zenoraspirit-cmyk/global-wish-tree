<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Wish Tree</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // --- 请在此处替换为您自己的 Firebase 配置信息 ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="top-nav">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search keyword..." oninput="searchWishes()">
            <button onclick="searchWishes()">Search</button>
        </div>
    </div>

    <div id="wish-canvas"></div>

    <div class="bottom-controls">
        <button id="btnMakeWish" class="main-btn">I want to make a wish</button>
        <button id="btnFulfillWish" class="main-btn">I want to fulfill a wish</button>
    </div>

    <div id="wishModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeWish">&times;</span>
            <h2>Make Your Wish</h2>
            
            <div id="paymentSection">
                <p>A $1 donation is required to post your wish.</p>
                <p style="font-size: 12px; color: #aaa; margin-bottom: 15px;">You will be redirected to the payment page.</p>
                <button onclick="handlePayment('wish')" class="pay-btn">Pay $1 & Continue</button>
            </div>

            <div id="wishFormSection" class="hidden">
                <p style="color:#2ecc71; margin-bottom:10px;">✓ Payment Successful!</p>
                <input type="text" id="userName" placeholder="Your Name / Nickname / Email">
                <textarea id="wishContent" placeholder="Write your heart's desire here..."></textarea>
                <select id="wishCategory">
                    <option value="wealth">Wealth</option>
                    <option value="career">Career</option>
                    <option value="success">Success</option>
                    <option value="love">Love</option>
                    <option value="health">Health</option>
                    <option value="family">Family</option>
                    <option value="travel">Travel</option>
                    <option value="wisdom">Wisdom</option>
                    <option value="peace">Peace</option>
                    <option value="happiness">Happiness</option>
                    <option value="courage">Courage</option>
                    <option value="friendship">Friendship</option>
                </select>
                <button onclick="submitWish()" class="submit-btn">Post to the Tree</button>
            </div>
        </div>
    </div>

    <div id="fulfillModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeFulfill">&times;</span>
            <h2>Fulfill Your Wish</h2>
            
            <div id="searchFulfillSection">
                <p>Find your active wish to fulfill it.</p>
                <input type="text" id="searchFulfillName" placeholder="Enter Name/Email used when wishing">
                <button onclick="findWishToFulfill()" class="pay-btn">Find My Wish</button>
            </div>

            <div id="fulfillActionSection" class="hidden">
                <div class="wish-preview" id="wishPreview"></div>
                <p>Pay any amount to turn this wish GOLD.</p>
                <input type="number" id="fulfillAmount" placeholder="Enter amount ($)" min="0.01" step="0.01">
                <button onclick="handlePayment('fulfill')" class="pay-btn">Pay & Fulfill Now</button>
            </div>
        </div>
    </div>

    <script src="app_v5.js"></script>
</body>
</html>
