<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Wish Tree - Manifest Your Soul</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="bg-fixed"></div>

    <div id="ui-layer">
        <div id="search-container">
            <input type="text" id="searchInput" placeholder="Search by Name/Nick/Email...">
            <div id="search-results" class="dropdown-list"></div>
        </div>

        <div id="wish-display"></div>
        
        <div id="overlay">
            <div class="button-group">
                <button id="openManifestModal" class="primary-btn">I Want to Manifest ($1)</button>
                <button id="openGratitudeModal" class="secondary-btn">Fulfill My Wish (≥$1)</button>
            </div>
        </div>
    </div>

    <div id="manifestModal" class="modal">
        <div class="modal-content">
            <h3>Manifest Your Wish</h3>
            <input type="text" id="nickName" placeholder="Name/Nickname/Email" required>
            <select id="wishCategory">
                <option value="Wealth">Wealth</option>
                <option value="Love">Love</option>
                <option value="Marriage">Marriage</option>
                <option value="Career">Career</option>
                <option value="Health">Health</option>
                <option value="Family">Family</option>
                <option value="Success">Success</option>
                <option value="Good Luck">Good Luck</option>
                <option value="Dreams">Dreams</option>
                <option value="Inner Peace">Inner Peace</option>
                <option value="Protection">Protection</option>
                <option value="Spiritual Growth">Spiritual Growth</option>
            </select>
            <textarea id="wishInput" maxlength="50" placeholder="Your wish (Max 50 chars)"></textarea>
            <div class="modal-btns">
                <button id="manifestBtn" class="primary-btn">Pay $1 & Submit</button>
                <button onclick="closeModals()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <div id="gratitudeModal" class="modal">
        <div class="modal-content">
            <h3>Fulfillment & Gratitude</h3>
            <p>Enter your ID to select a wish to mark as fulfilled:</p>
            <input type="text" id="gratitudeIdentity" placeholder="Name/Nickname/Email">
            <div id="user-wishes-to-repay" class="wish-selector-list"></div>
            <input type="number" id="gratitudeAmount" min="1" value="1" step="0.01" placeholder="Amount (min $1)">
            <div class="modal-btns">
                <button id="gratitudeBtn" class="gold-btn" disabled>Pay & Fulfill</button>
                <button onclick="closeModals()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="./app_v3.js"></script>
</body>
</html>
