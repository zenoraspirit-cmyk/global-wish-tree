<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Wish Tree</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="wish-display"></div>
        
        <div id="overlay">
            <div class="input-container">
                <textarea id="wishInput" placeholder="Write your global wish here..."></textarea>
                <div class="button-group">
                    <button id="manifestBtn" class="primary-btn">Manifest ($1)</button>
                    <button id="gratitudeBtn" class="secondary-btn">Fulfill (Any Amount)</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app_v3.js"></script>
</body>
</html>
